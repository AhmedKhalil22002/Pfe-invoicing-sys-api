version: '3.8'
services:
  frontend:
    build:
      context: ../invoicing-sys
      args:
        BASE_URL: http://localhost:8081
        NEXT_PUBLIC_BASE_URL: http://localhost:8081
        NEXT_PUBLIC_CABINET_ID: 1
    container_name: frontend-invoicing
    image: invoicing-sys-next-app:latest
    environment: 
      NODE_ENV: development
      NEXT_PUBLIC_BASE_URL: http://localhost:8081
      BASE_URL: http://localhost:8081
      NEXT_PUBLIC_CABINET_ID: 1
      CABINET_ID: 1
    networks:
      - app-network
    ports:
      - 3000:3000
    depends_on:
      - backend
  backend:
    build: .
    container_name: backend-invoicing
    environment:
      DATABASE_HOST: invoicingDatabase
      DATABASE_PORT: 3306
      DATABASE_USERNAME: username
      DATABASE_PASSWORD: password
      DATABASE_DATABASE: db
    ports:
      - 8081:8081
    networks:
      - app-network
    env_file: .env
    restart: unless-stopped
    depends_on:
      - db
  db:
    image: mysql:latest
    container_name: mysql-invoicing
    hostname: invoicingDatabase
    ports:
      - 3306:3306
    environment:
      MYSQL_DATABASE: 'db'
      MYSQL_USER: 'username'
      MYSQL_PASSWORD: 'password'
      MYSQL_ROOT_PASSWORD: 'password'
    volumes:
      - mysql-data:/var/lib/mysql
    restart: unless-stopped
    networks:
      - app-network
networks:
  app-network:
volumes:
  mysql-data: